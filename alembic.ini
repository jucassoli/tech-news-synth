# Alembic config for tech-news-synth.
#
# IMPORTANT (T-02-01): this file MUST NOT contain a populated `sqlalchemy.url`.
# The DSN is materialized at runtime by `alembic/env.py` via
# `tech_news_synth.config.load_settings().database_url`. Checking in a real
# DSN (even a placeholder) risks leaking credentials and is asserted against
# by `tests/unit/test_alembic_config.py`.

[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s
path_separator = os

# sqlalchemy.url intentionally absent — env.py sets it from Settings (T-02-01).


[post_write_hooks]


# Logging configuration. Alembic + sqlalchemy loggers set to WARN (T-02-02):
# INFO-level SA output can echo parameterized DSN fragments; WARN keeps the
# connection string out of CLI + container logs.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = WARN
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
