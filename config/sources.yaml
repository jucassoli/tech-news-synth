# tech-news-synth — Phase 4 sources configuration (D-01).
# 6 configured sources: 5 RSS + 1 Reddit JSON.
# Names are underscore-normalized; also used as source_state.name PK and articles.source.
max_articles_per_fetch: 30
max_article_age_hours: 24
sources:
  - {name: techcrunch, type: rss, url: https://techcrunch.com/feed/, timeout_sec: 20}
  - {name: verge, type: rss, url: https://www.theverge.com/rss/index.xml, timeout_sec: 20}
  - {name: ars_technica, type: rss, url: https://feeds.arstechnica.com/arstechnica/index, timeout_sec: 20}
  - {name: cointelegraph, type: rss, url: https://cointelegraph.com/rss, timeout_sec: 20}
  - {name: mit_technology_review, type: rss, url: https://www.technologyreview.com/feed/, timeout_sec: 20}
  - {name: reddit_technology, type: reddit_json, url: https://www.reddit.com/r/technology/.json, timeout_sec: 15}
